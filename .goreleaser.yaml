# GoReleaser config for mdlr. Released from a laptop, no CI — see RELEASING.md.
#
# Ships `mdlr` (Rust), `mdlr-extract-go` (Go), and the C# POSIX launcher plus
# `libexec/mdlr-extract-csharp` support files. The sibling executables MUST
# travel together — at runtime `mdlr` finds extractor launchers next to itself
# (extraction.rs).
#
# Distribution:
#   - macOS  -> Homebrew Cask (thempatel/homebrew-tap)
#   - Linux  -> GitHub Release tarballs, for manual install or mise/aqua/etc.
#              glibc + static-musl, x86_64 + arm64.
#
# The Rust binary is cross-compiled with cargo-zigbuild (zig); the Go binary
# with the native toolchain. Requires `ulimit -n 65536` (the ~250-rlib link step
# overruns macOS's default fd limit) — set it in the shell that runs goreleaser.
version: 2

project_name: mdlr

before:
  hooks:
    # Framework-dependent, non-single-file publish: MSBuildWorkspace's BuildHost
    # discovery depends on normal assembly locations.
    - ./scripts/build-csharp-extractor.sh --bin-dir . --libexec-dir libexec/mdlr-extract-csharp --relative-libexec libexec/mdlr-extract-csharp

builds:
  # --- Rust binary, one build id per OS so each pairs into a clean archive ---
  - id: mdlr-macos
    builder: rust
    binary: mdlr
    targets:
      - x86_64-apple-darwin
      - aarch64-apple-darwin
    flags:
      - --release
      - --package=mdlr
    env:
      # GoReleaser's tag is the source of truth; build.rs bakes it into the
      # binary so `mdlr --version` matches the release.
      - "MDLR_VERSION={{ .Version }}"
    hooks:
      post:
        # zig does not sign Mach-O binaries, and macOS SIGKILLs unsigned arm64
        # binaries. Ad-hoc sign both darwin outputs so they can execute at all.
        # NOTE: ad-hoc signing is NOT notarization — Gatekeeper still blocks the
        # quarantined download ("could not verify ... malware"). The cask's
        # post-install hook below strips the quarantine xattr to get past that.
        - cmd: codesign --sign - --force --timestamp=none "{{ .Path }}"

  - id: mdlr-linux
    builder: rust
    binary: mdlr
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
    flags:
      - --release
      - --package=mdlr
    env:
      - "MDLR_VERSION={{ .Version }}"

  - id: mdlr-musl
    builder: rust
    binary: mdlr
    targets:
      - x86_64-unknown-linux-musl
      - aarch64-unknown-linux-musl
    flags:
      - --release
      - --package=mdlr
    env:
      - "MDLR_VERSION={{ .Version }}"

  # --- Go extractor. Pure Go (no cgo); a static linux binary runs on both glibc
  #     and musl, so one linux build feeds both linux archives. ---
  - id: go-macos
    builder: go
    binary: mdlr-extract-go
    main: .
    dir: tools/mdlr-extract-go
    env:
      - CGO_ENABLED=0
    goos: [darwin]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: go-linux
    builder: go
    binary: mdlr-extract-go
    main: .
    dir: tools/mdlr-extract-go
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  # macOS: consumed by the Homebrew cask.
  - id: macos
    ids: [mdlr-macos, go-macos]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - mdlr-extract-csharp
      - libexec/mdlr-extract-csharp/**/*
  # Linux glibc: manual / mise / aqua install from the GitHub Release.
  - id: linux
    ids: [mdlr-linux, go-linux]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - mdlr-extract-csharp
      - libexec/mdlr-extract-csharp/**/*
  # Linux static musl (Alpine/distroless). Suffix avoids colliding with glibc,
  # which shares the same os/arch.
  - id: linux-musl
    ids: [mdlr-musl, go-linux]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}_musl"
    files:
      - mdlr-extract-csharp
      - libexec/mdlr-extract-csharp/**/*

homebrew_casks:
  - name: mdlr
    ids: [macos] # macOS only; Linux installs come from the Release tarballs
    binaries:
      - mdlr
      - mdlr-extract-go
      - mdlr-extract-csharp
    repository:
      owner: thempatel
      name: homebrew-tap
    homepage: "https://github.com/thempatel/mdlr"
    description: "Polyglot code-analysis tool that builds a graph of source-level units and computes structural metrics"
    license: "MIT"
    # The binaries are ad-hoc signed, not Apple-notarized, so Gatekeeper otherwise
    # blocks them with "Apple could not verify ... may be malware". Strip the
    # download quarantine attribute on install. (Raw-tarball users, who don't go
    # through brew, still need to run `xattr -dr com.apple.quarantine` themselves.)
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}"]
          end

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
