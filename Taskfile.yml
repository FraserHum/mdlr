# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"
tasks:
  default:
    cmds:
      - task: build

  run:
    deps: [build]
    cmd: mdlr {{.CLI_ARGS}}

  build:
    vars:
      MODE: '{{.MODE | default "debug"}}'
      QUIET: '{{.QUIET | default "false"}}'
    cmds:
      - cargo build {{if eq .MODE "release"}}--release{{end}} {{if eq .QUIET "true"}}2>/dev/null{{end}}

  build-go:
    dir: tools/mdlr-extract-go
    cmds:
      - go build -o ../../bin/mdlr-extract-go .

  build-csharp:
    cmds:
      # No single-file publish: MSBuildWorkspace's BuildHost discovery relies
      # on Assembly.Location, which is empty in single-file bundles.
      - ./scripts/build-csharp-extractor.sh --bin-dir bin --libexec-dir bin/libexec/mdlr-extract-csharp --relative-libexec libexec/mdlr-extract-csharp

  link:
    vars:
      QUIET: '{{.QUIET | default "false"}}'
    deps:
      - task: build
        vars:
          QUIET: "{{.QUIET}}"
      - task: build-go
      - task: build-csharp
    dir: bin
    cmds:
      - ln -sf ../target/debug/mdlr .

  check:
    deps:
      - task: link
        vars: { QUIET: "true" }
    cmds:
      - mdlr check

  install:
    dir: "{{.ROOT_DIR}}"
    cmds:
      - cargo install --path crates/mdlr --root $HOME/.local
      - cd tools/mdlr-extract-go && go build -o $HOME/.local/bin/mdlr-extract-go .
      - ./scripts/build-csharp-extractor.sh --bin-dir $HOME/.local/bin --libexec-dir $HOME/.local/lib/mdlr-extract-csharp --relative-libexec ../lib/mdlr-extract-csharp

  release:
    desc: Cut a release with GoReleaser (publishes the GitHub Release + pushes the cask).
    dir: "{{.ROOT_DIR}}"
    cmds:
      # ulimit must be raised in the same shell as goreleaser: zig's linker opens
      # every .rlib at once and overruns macOS's default 256-fd limit. gh mints an
      # ephemeral token (repo scope) for both the Release and the tap push.
      # Wrapped in bash -c because Task's embedded shell has no `ulimit` builtin.
      - bash -c 'ulimit -n 65536 && GITHUB_TOKEN=$(gh auth token) goreleaser release --clean'

  release-snapshot:
    desc: Dry-run the release matrix locally without publishing.
    dir: "{{.ROOT_DIR}}"
    cmds:
      - bash -c 'ulimit -n 65536 && goreleaser release --snapshot --clean'
