# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"
tasks:
  default:
    cmds:
      - task: build

  run:
    deps: [build]
    cmd: mdlr {{.CLI_ARGS}}

  build:
    vars:
      MODE: '{{.MODE | default "debug"}}'
      QUIET: '{{.QUIET | default "false"}}'
    cmds:
      - cargo build {{if eq .MODE "release"}}--release{{end}} {{if eq .QUIET "true"}}2>/dev/null{{end}}

  build-go:
    dir: tools/mdlr-extract-go
    cmds:
      - go build -o ../../bin/mdlr-extract-go .

  link:
    vars:
      QUIET: '{{.QUIET | default "false"}}'
    deps:
      - task: build
        vars:
          QUIET: "{{.QUIET}}"
      - task: build-go
    dir: bin
    cmds:
      - ln -sf ../target/debug/mdlr .
      - ln -sf ../target/debug/mdlr-extract-rust .
      - ln -sf ../target/debug/mdlr-extract-ts .
      - ln -sf ../target/debug/mdlr-extract-py .

  check:
    deps:
      - task: link
        vars: { QUIET: "true" }
    cmds:
      - mdlr check

  install:
    dir: "{{.ROOT_DIR}}"
    cmds:
      - cargo install --path crates/mdlr --root $HOME/.local
      - cargo install --path tools/mdlr-extract-rust --root $HOME/.local
      - cargo install --path tools/mdlr-extract-ts --root $HOME/.local
      - cargo install --path tools/mdlr-extract-py --root $HOME/.local
      - cd tools/mdlr-extract-go && go build -o $HOME/.local/bin/mdlr-extract-go .
